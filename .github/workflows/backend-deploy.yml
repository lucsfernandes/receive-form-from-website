name: CI/CD Backend Deploy to VPS with K8s

on:
  push:
   branches:
    - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_PASS }}

      - name: Build and push Docker image
        run: |
          IMAGE_NAME=${{ secrets.DOCKERHUB_USER }}/receive-forms-api:${{ github.sha }}
          docker build -t $IMAGE_NAME backend/
          docker push $IMAGE_NAME

      - name: Prepare kubeconfig
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          mkdir -p $HOME/.kube
          echo "$KUBECONFIG_DATA" | base64 --decode > $HOME/.kube/config

      - name: Criar namespace se não existir
        run: |
          kubectl get namespace receive-forms || kubectl create namespace receive-forms

      - name: Criar/atualizar secret no cluster
        env:
            CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
            AUTH_JWT_SECRET: ${{ secrets.AUTH_JWT_SECRET }}
            DB_HOST: ${{ secrets.DB_HOST }}
            DB_PORT: ${{ secrets.DB_PORT }}
            DB_USER: ${{ secrets.DB_USER }}
            DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
            DB_NAME: ${{ secrets.DB_NAME }}
            DB_POOL_MAX: ${{ secrets.DB_POOL_MAX }}
            DB_SYNCHRONIZE: ${{ secrets.DB_SYNCHRONIZE }}
            DB_LOGGING: ${{ secrets.DB_LOGGING }}
            DB_SSLMODE: ${{ secrets.DB_SSLMODE }}
            AUTH_COOKIE_SAMESITE: ${{ secrets.AUTH_COOKIE_SAMESITE }}
            AUTH_COOKIE_SECURE: ${{ secrets.AUTH_COOKIE_SECURE }}
            AUTH_ACCESS_TTL_SECONDS: ${{ secrets.AUTH_ACCESS_TTL_SECONDS }}
            AUTH_REFRESH_TTL_SECONDS: ${{ secrets.AUTH_REFRESH_TTL_SECONDS }}
            ADMIN_BOOTSTRAP_EMAIL: ${{ secrets.ADMIN_BOOTSTRAP_EMAIL }}
            ADMIN_BOOTSTRAP_PASSWORD: ${{ secrets.ADMIN_BOOTSTRAP_PASSWORD }}
            ADMIN_BOOTSTRAP_ALLOW_PROD: ${{ secrets.ADMIN_BOOTSTRAP_ALLOW_PROD }}

        run: |
          kubectl create secret generic receive-forms-api-secret -n receive-forms \
            --from-literal=AUTH_JWT_SECRET="${AUTH_JWT_SECRET}" \
            --from-literal=DB_HOST="${DB_HOST}" \
            --from-literal=DB_PORT="${DB_PORT}" \
            --from-literal=DB_USER="${DB_USER}" \
            --from-literal=DB_PASSWORD="${DB_PASSWORD}" \
            --from-literal=DB_NAME="${DB_NAME}" \
            --from-literal=DB_SYNCHRONIZE="${DB_SYNCHRONIZE}" \
            --from-literal=DB_LOGGING="${DB_LOGGING}" \
            --from-literal=DB_SSLMODE="${DB_SSLMODE}" \
            --from-literal=AUTH_COOKIE_SAMESITE="${AUTH_COOKIE_SAMESITE}" \
            --from-literal=AUTH_COOKIE_SECURE="${AUTH_COOKIE_SECURE}" \
            --from-literal=AUTH_ACCESS_TTL_SECONDS="${AUTH_ACCESS_TTL_SECONDS}" \
            --from-literal=AUTH_REFRESH_TTL_SECONDS="${AUTH_REFRESH_TTL_SECONDS}" \
            --from-literal=ADMIN_BOOTSTRAP_EMAIL="${ADMIN_BOOTSTRAP_EMAIL}" \
            --from-literal=ADMIN_BOOTSTRAP_PASSWORD="${ADMIN_BOOTSTRAP_PASSWORD}" \
            --from-literal=ADMIN_BOOTSTRAP_ALLOW_PROD="${ADMIN_BOOTSTRAP_ALLOW_PROD}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Replace image placeholder
        run: |
          IMAGE_NAME=${{ secrets.DOCKERHUB_USER }}/receive-forms-api:${{ github.sha }}
          sed -i "s|REPLACE_IMAGE|${IMAGE_NAME}|g" backend/k8s/deployment.yaml

      - name: kubectl apply
        run: |
          kubectl apply -k backend/k8s
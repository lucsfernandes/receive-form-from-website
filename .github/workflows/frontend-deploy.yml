name: CI/CD Frontend Deploy to VPS with K8s

on:
  push:
   branches:
    - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_PASS }}

      - name: Build and push Docker image
        run: |
          IMAGE_NAME=${{ secrets.DOCKERHUB_USER }}/receive-forms-app:${{ github.sha }}
          docker build -t $IMAGE_NAME frontend/
          docker push $IMAGE_NAME

      - name: Prepare kubeconfig
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          mkdir -p $HOME/.kube
          echo "$KUBECONFIG_DATA" | base64 --decode > $HOME/.kube/config

      - name: Criar namespace se não existir
        run: |
          kubectl get namespace receive-forms || kubectl create namespace receive-forms

      - name: Replace image placeholder
        run: |
          IMAGE_NAME=${{ secrets.DOCKERHUB_USER }}/receive-forms-app:${{ github.sha }}
          sed -i "s|REPLACE_IMAGE|${IMAGE_NAME}|g" frontend/k8s/deployment.yaml

      - name: kubectl apply
        run: |
          kubectl apply -k frontend/k8s
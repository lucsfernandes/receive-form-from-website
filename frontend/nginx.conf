server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Don't leak the server version in headers
    server_tokens off;

    # Restrict HTTP methods. Anything outside this list returns 405.
    # The SPA only needs GET/HEAD; OPTIONS is included for CORS preflights
    # if the SPA ever fetches a cross-origin asset.
    if ($request_method !~ ^(GET|HEAD|OPTIONS)$) {
        return 405;
    }

    # Security headers (apply on every response, including errors).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    # CSP: SPA is self-only. 'unsafe-inline' on style-src is kept because
    # Tailwind v4 ships a small runtime style tag. connect-src allows the
    # same-origin API (Traefik routes /api on the same host).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    # Lightweight gzip for static assets; keep it conservative to stay CPU-cheap.
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        application/javascript
        application/json
        application/xml
        application/xml+rss
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/plain
        text/xml;

    # Long-lived caching for fingerprinted Vite assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # SPA fallback — every unknown path renders index.html so React Router-style
    # client routes work even on hard refresh.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
    }

    # Simple health endpoint for Kubernetes probes
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Block common probe noise to keep logs clean
    location ~* /\.(?!well-known) {
        deny all;
    }
}

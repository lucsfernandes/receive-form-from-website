apiVersion: apps/v1
kind: Deployment
metadata:
  name: receive-forms-app
  namespace: receive-forms
  labels:
    app: receive-forms-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: receive-forms-app
  template:
    metadata:
      labels:
        app: receive-forms-app
    spec:
      securityContext:
        runAsNonRoot: true
        # 101 = "nginx" user shipped by nginx:alpine. The Dockerfile already
        # chowns /var/cache/nginx and /var/run/nginx.pid to this user.
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: REPLACE_IMAGE
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            # nginx writes temp/cache files here at runtime — the read-only
            # rootfs would otherwise block startup.
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: "20m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 10
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: receive-forms-app-hpa
  namespace: receive-forms
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: receive-forms-app
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
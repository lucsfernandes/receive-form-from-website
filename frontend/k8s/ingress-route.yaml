apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: receive-forms-app-ingress
  namespace: receive-forms
  labels:
    app.kubernetes.io/name: receive-forms-app
    app.kubernetes.io/part-of: arcobatrox
spec:
  # Only handle HTTPS here. The `web` (port 80) entrypoint should be wired
  # globally to redirect to `websecure` in your Traefik static config —
  # serving plain HTTP for the app would break HSTS + secure cookies.
  entryPoints:
    - websecure
  routes:
    - match: Host(`app.form.arcobatrox.com.br`) && PathPrefix(`/`)
      kind: Rule
      services:
        - name: receive-forms-app
          port: 80
    - match: Host(`www.app.form.arcobatrox.com.br`) && PathPrefix(`/`)
      kind: Rule
      services:
        - name: receive-forms-app
          port: 80
  tls:
    secretName: receive-forms-app-tls
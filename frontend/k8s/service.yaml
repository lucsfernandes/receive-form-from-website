apiVersion: v1
kind: Service
metadata:
  name: receive-forms-app
  namespace: receive-forms
spec:
  type: ClusterIP
  selector:
    app: receive-forms-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
      name: http
    - protocol: TCP
      port: 443
      targetPort: 3000
      name: https
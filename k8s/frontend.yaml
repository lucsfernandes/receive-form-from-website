# receive-forms-app: React SPA served by Nginx.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: receive-forms-app
  namespace: receive-forms
  labels:
    app: receive-forms-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: receive-forms-app
  template:
    metadata:
      labels:
        app: receive-forms-app
    spec:
      securityContext:
        runAsNonRoot: true
        # 101 = "nginx" user shipped by nginx:alpine. The Dockerfile already
        # chowns /var/cache/nginx and /var/run/nginx.pid to this user.
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: REPLACE_IMAGE
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            # nginx writes temp/cache files here at runtime — the read-only
            # rootfs would otherwise block startup.
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: "20m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 10
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: receive-forms-app
  namespace: receive-forms
spec:
  type: ClusterIP
  selector:
    app: receive-forms-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
      name: http
    - protocol: TCP
      port: 443
      targetPort: 3000
      name: https
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: receive-forms-app-hpa
  namespace: receive-forms
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: receive-forms-app
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: receive-forms-app-ingress
  namespace: receive-forms
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    # traefik.ingress.kubernetes.io/router.middlewares: receive-forms-app-redirect-www@kubernetescrd,receive-forms-api-redirect-to-https@kubernetescrd
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - app.form.arcobatrox.com.br
        - www.app.form.arcobatrox.com.br
      secretName: receive-forms-tls
  rules:
    - host: app.form.arcobatrox.com.br
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: receive-forms-api
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: receive-forms-app
                port:
                  number: 80
    - host: www.app.form.arcobatrox.com.br
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: receive-forms-api
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: receive-forms-app
                port:
                  number: 80
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: receive-forms-app-ingress
  namespace: receive-forms
spec:
  entryPoints:
    - web
    - websecure
  routes:
    # Explicit priorities so /api always beats the SPA catch-all regardless
    # of Traefik's rule-length heuristic.
    - match: Host(`app.form.arcobatrox.com.br`) && PathPrefix(`/api`)
      kind: Rule
      priority: 100
      services:
        - name: receive-forms-api
          port: 80
    - match: Host(`www.app.form.arcobatrox.com.br`) && PathPrefix(`/api`)
      kind: Rule
      priority: 100
      services:
        - name: receive-forms-api
          port: 80
    - match: Host(`app.form.arcobatrox.com.br`) && PathPrefix(`/`)
      kind: Rule
      priority: 10
      services:
        - name: receive-forms-app
          port: 80
      # middlewares:
      #   - name: receive-forms-app-redirect-www
      #     namespace: receive-forms
      #   - name: receive-forms-app-redirect-to-https
      #     namespace: receive-forms
    - match: Host(`www.app.form.arcobatrox.com.br`) && PathPrefix(`/`)
      kind: Rule
      priority: 10
      services:
        - name: receive-forms-app
          port: 80
      # middlewares:
      #   - name: receive-forms-app-redirect-to-https
      #     namespace: receive-forms
  tls:
    secretName: receive-forms-tls
    certResolver: le
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: receive-forms-app-redirect-to-https
  namespace: receive-forms
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: receive-forms-app-redirect-www
  namespace: receive-forms
spec:
  redirectRegex:
    regex: ^https?://www\.(.*)
    replacement: https://${1}
    permanent: true
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: receive-forms-app-cors-headers
  namespace: receive-forms
spec:
  headers:
    accessControlAllowMethods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    accessControlAllowOriginList:
      - "https://app.form.arcobatrox.com.br"
      - "https://www.app.form.arcobatrox.com.br"
    accessControlAllowHeaders:
      - Content-Type
      - Authorization
      - X-Requested-With
    accessControlAllowCredentials: true


# receive-forms-api: Express + TypeORM backend.
#
# !!! SECRET HANDLING !!!
# The Secret below ships PLACEHOLDER values only. Do NOT commit real
# credentials. In production, render this through SealedSecrets, External
# Secrets Operator, or SOPS so the cleartext never reaches git.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: receive-forms-api-config
  namespace: receive-forms
data:
  NODE_ENV: "production"
  PORT: "3000"
  LOG_LEVEL: "info"
  # Same-origin under Strategy A — frontend and API share app.form.* host.
  CORS_ORIGIN: "https://app.form.arcobatrox.com.br,https://www.app.form.arcobatrox.com.br"
  DB_HOST: "receive-forms-postgres"
  DB_PORT: "5432"
  DB_NAME: "receive_forms"
  DB_POOL_MAX: "10"
  # Use migrations in production; never rely on synchronize for schema changes.
  DB_SYNCHRONIZE: "false"
  DB_LOGGING: "false"
  # Session cookie posture in prod: strict + secure (HTTPS only).
  AUTH_COOKIE_SAMESITE: "strict"
  AUTH_COOKIE_SECURE: "true"
  AUTH_ACCESS_TTL_SECONDS: "900"
  AUTH_REFRESH_TTL_SECONDS: "604800"
  # First-admin bootstrap is gated by this flag in prod. Flip to "true" only
  # for the very first apply; flip back to "false" once you have a user.
  ADMIN_BOOTSTRAP_ALLOW_PROD: "false"
---
apiVersion: v1
kind: Secret
metadata:
  name: receive-forms-api-secret
  namespace: receive-forms
type: Opaque
stringData:
  DB_USER: 'form_admin'
  DB_PASSWORD: '8HDJOavtD1Ejc9Pe'
  # 48+ random bytes, hex-encoded — signs the dashboard session JWT.
  # Generate with: openssl rand -hex 48
  AUTH_JWT_SECRET: "4c0572d6fff094b54b7a90598331fa83fff1ca8a8cf5700051a7edcbbc2826fb9696d1328d49a1b97a287e6f8ec0e6e4"
  # Optional service-to-service bearer token. Leave empty unless an
  # automation needs to hit the admin GET endpoints without a session.
  # Generate with: openssl rand -hex 32
  ADMIN_STATIC_TOKEN: ""
  # Optional. When set, public POSTs must include a valid X-Signature.
  INGEST_HMAC_SECRET: ""
  # ---------------------------------------------------------------------------
  # First-admin bootstrap. Set BOTH to a strong dev/admin credential on the
  # very first deploy, then either remove them or set ADMIN_BOOTSTRAP_ALLOW_PROD
  # back to "false" so subsequent rollouts don't re-seed.
  # ---------------------------------------------------------------------------
  ADMIN_BOOTSTRAP_EMAIL: "lbandeira845@gmail.com"
  ADMIN_BOOTSTRAP_PASSWORD: "lucas193"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: receive-forms-api
  namespace: receive-forms
  labels:
    app: receive-forms-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: receive-forms-api
  template:
    metadata:
      labels:
        app: receive-forms-api
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: receive-forms-api
          image: REPLACE_IMAGE
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: receive-forms-api-config
            - secretRef:
                name: receive-forms-api-secret
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          # Writable /tmp emptyDir because readOnlyRootFilesystem is on.
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          lifecycle:
            preStop:
              exec:
                # Give the load balancer a few seconds to drop us from the
                # endpoint pool before we start refusing connections.
                command: ["sh", "-c", "sleep 5"]
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/v1/ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: receive-forms-api
  namespace: receive-forms
spec:
  type: ClusterIP
  selector:
    app: receive-forms-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
      name: http
    - protocol: TCP
      port: 443
      targetPort: 3000
      name: https
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: receive-forms-api-hpa
  namespace: receive-forms
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: receive-forms-api
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: receive-forms-api-ingress
  namespace: receive-forms
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    # traefik.ingress.kubernetes.io/router.middlewares: receive-forms-api-redirect-www@kubernetescrd,receive-forms-api-redirect-to-https@kubernetescrd
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - api.form.arcobatrox.com.br
        - www.api.form.arcobatrox.com.br
      secretName: receive-forms-tls
  rules:
    - host: api.form.arcobatrox.com.br
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: receive-forms-api
                port:
                  number: 80
    - host: www.api.form.arcobatrox.com.br
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: receive-forms-api
                port:
                  number: 80
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: receive-forms-api-ingress
  namespace: receive-forms
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`api.form.arcobatrox.com.br`) && PathPrefix(`/api/v1`)
      kind: Rule
      services:
        - name: receive-forms-api
          port: 80
      # middlewares:
      #   - name: receive-forms-api-redirect-www
      #     namespace: receive-forms
      #   - name: receive-forms-api-redirect-to-https
      #     namespace: receive-forms
    - match: Host(`www.api.form.arcobatrox.com.br`) && PathPrefix(`/api/v1`)
      kind: Rule
      services:
        - name: receive-forms-api
          port: 80
      # middlewares:
      #   - name: receive-forms-api-redirect-to-https
      #     namespace: receive-forms
  tls:
    secretName: receive-forms-tls
    certResolver: le
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: receive-forms-api-redirect-to-https
  namespace: receive-forms
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: receive-forms-api-redirect-www
  namespace: receive-forms
spec:
  redirectRegex:
    regex: ^https?://www\.(.*)
    replacement: https://${1}
    permanent: true
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: receive-forms-api-cors-headers
  namespace: receive-forms
spec:
  headers:
    accessControlAllowMethods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    accessControlAllowOriginList:
      - "https://api.form.arcobatrox.com.br"
      - "https://www.api.form.arcobatrox.com.br"
    accessControlAllowHeaders:
      - Content-Type
      - Authorization
      - X-Requested-With
    accessControlAllowCredentials: true

